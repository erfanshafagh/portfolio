<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erfan Shafagh — Portfolio</title>
    <link rel="icon" id="favicon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="styles.css" />

  <body>
    <div class="layout">

      <!-- ══ LEFT SIDEBAR ══ -->
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="avatar-ring">
            <img id="avatarImg" class="avatar" src="" alt="Profile" />
          </div>
          <h1 class="profile-name" id="profileName"></h1>
          <p  class="profile-role" id="profileRole"></p>
          <div class="divider"></div>
          <nav class="profile-links" id="profileLinks"></nav>
        </div>
      </aside>

      <!-- ══ RIGHT MAIN ══ -->
      <main class="main-content">
        <nav class="tab-nav" id="tabNav" role="tablist"></nav>
        <div class="panel-container" id="panelContainer"></div>
      </main>

    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
